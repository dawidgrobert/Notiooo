name: Recent Individual Projects
on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-recent-individual-projects:
    name: Update this repos README with best projects of the best
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          max_post_count: "10"
          comment_tag_name: "RECENT-INDIVIDUAL-PROJECTS-LIST"
          feed_list: "https://grobert.dev/feed/individual-projects/"